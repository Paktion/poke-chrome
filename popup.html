<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pokemon Cursor</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      width: 280px;
      margin: 0;
      padding: 14px 16px 16px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #18181b;
      color: #f4f4f5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background-image: url("ditto.png");
      background-repeat: no-repeat;
      background-size: 112px 112px; /* 4 frames * 28 */
      background-position: 0 0;
      image-rendering: pixelated;
    }
    h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .label {
      font-size: 13px;
      color: #d4d4d8;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      cursor: pointer;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #3f3f46;
      transition: 0.2s;
      border-radius: 22px;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      top: 3px;
      background-color: #fafafa;
      transition: 0.2s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #a78bfa;
    }
    input:checked + .slider::before {
      transform: translateX(16px);
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #71717a;
      margin: 0 0 8px;
    }
    .picker {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .pick {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 1 / 1;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .pick:hover {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
    }
    .pick[aria-pressed="true"] {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
    }
    .pick > span {
      display: block;
      image-rendering: pixelated;
      background-repeat: no-repeat;
    }
    .hint {
      margin: 12px 0 0;
      font-size: 11px;
      color: #71717a;
      line-height: 1.5;
    }
    .hint kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      color: #d4d4d8;
      background: #27272a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }
    .hint code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon" aria-hidden="true"></div>
    <h1>Pokemon Cursor</h1>
  </div>

  <div class="row">
    <span class="label">Follow my cursor</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <p class="section-title">Choose your buddy</p>
    <div class="picker" id="picker"></div>
  </div>

  <p class="hint">
    Shortcut: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>0</kbd>
    (<kbd>⌘</kbd>+<kbd>⇧</kbd>+<kbd>0</kbd> on Mac).
    Customize at <code>chrome://extensions/shortcuts</code>.
  </p>

  <script src="popup.js"></script>
</body>
</html>
