<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ditto Cursor</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      width: 220px;
      margin: 0;
      padding: 14px 16px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #18181b;
      color: #f4f4f5;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    label {
      font-size: 13px;
      color: #d4d4d8;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #3f3f46;
      transition: 0.2s;
      border-radius: 22px;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      top: 3px;
      background-color: #fafafa;
      transition: 0.2s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #a78bfa;
    }
    input:checked + .slider::before {
      transform: translateX(16px);
    }
    .hint {
      margin: 10px 0 0;
      font-size: 11px;
      color: #71717a;
      line-height: 1.4;
    }
    .ditto {
      width: 32px;
      height: 32px;
      background-image: url("ditto.png");
      background-repeat: no-repeat;
      background-size: 128px 128px;
      background-position: 0 0;
      image-rendering: pixelated;
      flex-shrink: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="ditto" aria-hidden="true"></div>
    <h1>Ditto Cursor</h1>
  </div>
  <div class="row">
    <label for="toggle">Follow my cursor</label>
    <span class="switch">
      <input type="checkbox" id="toggle" checked />
      <span class="slider"></span>
    </span>
  </div>
  <p class="hint">Reload pages already open after toggling.</p>
  <script src="popup.js"></script>
</body>
</html>
